# See https://docs.aspect.build/workflows/configuration
workspaces:
    .:
        icon: webpack
        label: rules_webpack
    e2e/loaders:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
    e2e/loaders_jslib:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
    e2e/smoke:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
    e2e/worker:
        icon: bazel
        tasks:
            - test:
                  queue: aspect-medium
            - buildifier:
                  without: true
tasks:
    - checkout:
          update_strategy: rebase
    - test:
          name: 'Test (Bazel 7)'
          env:
              USE_BAZEL_VERSION: 7.x
          bazel:
              flags:
                  - --test_tag_filters=-skip-on-bazel7
    - test:
          name: 'Test (Bazel 8)'
          env:
              USE_BAZEL_VERSION: 8.x
          bazel:
              flags:
                  - --test_tag_filters=-skip-on-bazel8
    - test:
          name: 'Test (Bazel 9)'
          env:
              USE_BAZEL_VERSION: 9.x
          bazel:
              flags:
                  - --test_tag_filters=-skip-on-bazel9
    - buildifier:
          queue: aspect-medium
    - finalization:
          queue: aspect-small
notifications:
    github: {}
